

name: CICD pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: node.js setup
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - run: npm ci
    - run: npm test
    - run: npm run build
